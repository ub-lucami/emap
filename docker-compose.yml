version: '3.8'

services:
  db:
    image: mariadb:10.6  # Stable version; avoids bugs in newer/latest
    container_name: emap-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: '1'  # Recreates internal healthcheck user if needed
    volumes:
      - db-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 60s   # Wait 60s before first check (critical for init.sql)
      interval: 30s
      timeout: 10s
      retries: 10         # Total wait up to ~6 minutes
  app:
    build: .
    container_name: emap-app
    restart: always
    depends_on:
      db:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
    volumes:
      - .:/app
      - static-volume:/app/staticfiles
      - media-volume:/app/media

  nginx:
    image: nginx:latest
    container_name: emap-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - static-volume:/app/staticfiles
      - media-volume:/app/media   

volumes:
  db-data:
  static-volume:
  media-volume: