version: '3.8'

services:
  db:
    image: mariadb:10.11  # pinned stable version, latest has been buggy lately
    container_name: emap-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 0
    volumes:
      - db-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "--protocol=tcp", "ping"]
      interval: 10s
      timeout: 10s
      retries: 30        # ← gives up to 5 minutes total
      start_period: 60s  # ← waits 60 seconds before first check (critical!)
  app:
    build: .
    container_name: emap-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
    volumes:
      - .:/app
      - static-volume:/app/staticfiles
      - media-volume:/app/media

  nginx:
    image: nginx:latest
    container_name: emap-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static-volume:/app/staticfiles
      - media-volume:/app/media

volumes:
  db-data:
  static-volume:
  media-volume: