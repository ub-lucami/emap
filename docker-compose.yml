version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: emap_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Remove MARIADB_AUTO_UPGRADE if you added it before
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb", "--user=${DB_USER}", "--password=${DB_PASSWORD}", "--host=127.0.0.1", "--port=3306", "--execute=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s  # Extra time for init scripts on first run

  web:
    build: .
    container_name: emap_web
    restart: unless-stopped
    volumes:
      - ./:/app:cached
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput && \
      python manage.py collectstatic --noinput || true && \
      gunicorn landing_page.wsgi:application --bind 0.0.0.0:8000 || python manage.py runserver 0.0.0.0:8000"

volumes:
  db_data:
    driver: local
